# ── Build & Push Docker image on release branches ────────────────────────────
#
# Trigger: push to branches matching `release-*` (e.g., release-1.0.0)
# Extracts version from branch name, builds the Docker image, pushes to GHCR.
#
# Required: repo must have packages:write permission (default for GITHUB_TOKEN).

name: Release Docker Image

on:
  push:
    branches:
      - 'release-*'

permissions:
  contents: read
  packages: write

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Run tests
        run: yarn vitest run

  build-and-push:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version from branch name
        id: version
        run: |
          BRANCH="${GITHUB_REF_NAME}"
          VERSION="${BRANCH#release-}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Building version: ${VERSION}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/jayrchamp/platform-agent:${{ steps.version.outputs.version }}
            ghcr.io/jayrchamp/platform-agent:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
